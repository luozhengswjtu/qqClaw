# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "QQClaw"

[setup]
script = ""

[[actions]]
name = "初始化"
icon = "run"
command = '''
cd E:\sumoAndQt\QQClaw

$conn = Get-NetTCPConnection -LocalPort 8787 -State Listen -ErrorAction SilentlyContinue | Select-Object -First 1
if ($conn) {
  Stop-Process -Id $conn.OwningProcess -Force
  Start-Sleep -Seconds 1
}

$dataDir = Resolve-Path .\apps\openclaw-api\data
Remove-Item -LiteralPath (Join-Path $dataDir 'openclaw.sqlite') -Force -ErrorAction SilentlyContinue
Remove-Item -LiteralPath (Join-Path $dataDir 'openclaw.sqlite-shm') -Force -ErrorAction SilentlyContinue
Remove-Item -LiteralPath (Join-Path $dataDir 'openclaw.sqlite-wal') -Force -ErrorAction SilentlyContinue

Start-Process -FilePath 'npm.cmd' -ArgumentList @('run','dev') -WorkingDirectory '.\apps\openclaw-api' -WindowStyle Hidden

for ($i = 0; $i -lt 20; $i++) {
  try {
    $health = Invoke-RestMethod -Uri 'http://127.0.0.1:8787/health' -TimeoutSec 2
    $b = Invoke-RestMethod -Uri 'http://127.0.0.1:8787/api/bootstrap' -TimeoutSec 2
    break
  } catch {
    Start-Sleep -Seconds 1
  }
}

[pscustomobject]@{
  aiConfigured = $health.ai.configured
  aiProvider = $health.ai.provider
  aiModel = $health.ai.model
  checkins = $b.checkins.Count
  activeCheckin = ($b.checkins | Where-Object { $_.status -eq 'active' } | Select-Object -First 1 -ExpandProperty key)
  doneCheckins = @($b.checkins | Where-Object { $_.status -eq 'done' }).Count
  lobsterAdoptedAt = $b.lobster.adoptedAt
  unlockedRewards = @($b.rewards | Where-Object { $_.unlocked }).Count
  achievements = $b.achievements.Count
  workLogs = $b.workLogs.Count
}
'''

[[actions]]
name = "运行"
icon = "tool"
command = '''
cd E:\sumoAndQt\QQClaw\apps\openclaw-api
npm run dev
cd E:\sumoAndQt\QQClaw\apps\qq-lobster-v2
npm run dev -- --host 127.0.0.1 --port 5173
start http://127.0.0.1:5173/
Invoke-RestMethod http://127.0.0.1:8787/health | ConvertTo-Json -Depth 5
'''

[[actions]]
name = "停止"
icon = "tool"
command = '''
$conn = Get-NetTCPConnection -LocalPort 8787 -State Listen -ErrorAction SilentlyContinue | Select-Object -First 1
if ($conn) {
  Stop-Process -Id $conn.OwningProcess -Force
}
$conn = Get-NetTCPConnection -LocalPort 5173 -State Listen -ErrorAction SilentlyContinue | Select-Object -First 1
if ($conn) {
  Stop-Process -Id $conn.OwningProcess -Force
}
Get-NetTCPConnection -LocalPort 8787,5173 -State Listen -ErrorAction SilentlyContinue
'''
